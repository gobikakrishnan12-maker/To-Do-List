<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Todo List</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --surface: #181818;
      --surface2: #222222;
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.18);
      --text: #f0ede6;
      --text-muted: #888;
      --text-dim: #555;
      --accent: #c8f05a;
      --accent-dark: #a8cc3a;
      --danger: #ff5f5f;
      --radius: 14px;
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 48px 20px 80px;
    }

    .container {
      width: 100%;
      max-width: 540px;
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Header */
    header {
      margin-bottom: 36px;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 6px;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 42px;
      font-weight: 400;
      line-height: 1;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .date-label {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 300;
      letter-spacing: 0.04em;
      padding-bottom: 4px;
    }

    .stats-row {
      display: flex;
      gap: 20px;
      margin-top: 16px;
    }

    .stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .stat-num {
      font-size: 22px;
      font-weight: 500;
      color: var(--text);
      line-height: 1;
    }

    .stat-label {
      font-size: 11px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .divider {
      width: 1px;
      background: var(--border);
      align-self: stretch;
    }

    /* Progress */
    .progress-wrap {
      margin-top: 18px;
      height: 3px;
      background: var(--surface2);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    /* Input area */
    .input-section {
      margin-bottom: 28px;
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .input-wrap {
      flex: 1;
      position: relative;
    }

    input[type="text"] {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 18px;
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    input[type="text"]::placeholder { color: var(--text-dim); }

    input[type="text"]:focus {
      border-color: var(--accent);
      background: #1c1c1c;
    }

    .priority-select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 12px;
      color: var(--text-muted);
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .priority-select:focus { border-color: var(--accent); }

    .add-btn {
      background: var(--accent);
      color: #0e0e0e;
      border: none;
      border-radius: var(--radius);
      padding: 14px 22px;
      font-size: 15px;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
    }

    .add-btn:hover { background: var(--accent-dark); }
    .add-btn:active { transform: scale(0.97); }

    /* Filter tabs */
    .filter-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 20px;
      background: var(--surface);
      padding: 4px;
      border-radius: 10px;
      border: 1px solid var(--border);
    }

    .tab {
      flex: 1;
      background: none;
      border: none;
      padding: 8px;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      color: var(--text-muted);
      border-radius: 7px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .tab.active {
      background: var(--surface2);
      color: var(--text);
    }

    .tab:hover:not(.active) { color: var(--text); }

    /* Todo items */
    .todo-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      transition: border-color 0.2s, opacity 0.2s;
      animation: slideIn 0.25s ease both;
      position: relative;
      overflow: hidden;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-10px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .todo-item:hover { border-color: var(--border-hover); }

    .todo-item.completed { opacity: 0.5; }

    .todo-item.completed .todo-text {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    /* Priority indicator */
    .todo-item::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      border-radius: 99px 0 0 99px;
    }

    .todo-item[data-priority="high"]::before { background: #ff5f5f; }
    .todo-item[data-priority="medium"]::before { background: #f0c05a; }
    .todo-item[data-priority="low"]::before { background: var(--accent); }

    /* Checkbox */
    .checkbox {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1.5px solid var(--border-hover);
      background: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
    }

    .checkbox:hover { border-color: var(--accent); }

    .todo-item.completed .checkbox {
      background: var(--accent);
      border-color: var(--accent);
    }

    .checkbox svg {
      opacity: 0;
      transform: scale(0.5);
      transition: all 0.15s;
    }

    .todo-item.completed .checkbox svg {
      opacity: 1;
      transform: scale(1);
    }

    .todo-text {
      flex: 1;
      font-size: 15px;
      font-weight: 400;
      color: var(--text);
      transition: color 0.2s;
      word-break: break-word;
    }

    .todo-meta {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .priority-badge {
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 99px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .badge-high   { background: rgba(255,95,95,0.12); color: #ff5f5f; }
    .badge-medium { background: rgba(240,192,90,0.12); color: #f0c05a; }
    .badge-low    { background: rgba(200,240,90,0.12); color: var(--accent); }

    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-dim);
      padding: 4px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
    }

    .delete-btn:hover { color: var(--danger); background: rgba(255,95,95,0.1); }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 56px 0 40px;
      display: none;
    }

    .empty.show { display: block; }

    .empty-icon {
      font-size: 40px;
      margin-bottom: 14px;
      opacity: 0.3;
    }

    .empty p {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: 18px;
      color: var(--text-dim);
    }

    /* Clear btn */
    .footer-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 20px;
    }

    .clear-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 12px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }

    .clear-btn:hover { color: var(--danger); background: rgba(255,95,95,0.08); }
  </style>
</head>
<body>

<div class="container">

  <header>
    <div class="header-top">
      <h1>My <em>Tasks</em></h1>
      <span class="date-label" id="date-label"></span>
    </div>
    <div class="stats-row">
      <div class="stat">
        <span class="stat-num" id="stat-total">0</span>
        <span class="stat-label">Total</span>
      </div>
      <div class="divider"></div>
      <div class="stat">
        <span class="stat-num" id="stat-done">0</span>
        <span class="stat-label">Done</span>
      </div>
      <div class="divider"></div>
      <div class="stat">
        <span class="stat-num" id="stat-left">0</span>
        <span class="stat-label">Remaining</span>
      </div>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar" id="progress-bar" style="width:0%"></div>
    </div>
  </header>

  <div class="input-section">
    <div class="input-row">
      <div class="input-wrap">
        <input type="text" id="todo-input" placeholder="Add a new task..." maxlength="120" />
      </div>
      <select class="priority-select" id="priority-select">
        <option value="medium">⚡ Medium</option>
        <option value="high">🔴 High</option>
        <option value="low">🟢 Low</option>
      </select>
      <button class="add-btn" onclick="addTodo()">Add</button>
    </div>
  </div>

  <div class="filter-tabs">
    <button class="tab active" data-filter="all" onclick="setFilter('all', this)">All</button>
    <button class="tab" data-filter="active" onclick="setFilter('active', this)">Active</button>
    <button class="tab" data-filter="completed" onclick="setFilter('completed', this)">Completed</button>
    <button class="tab" data-filter="high" onclick="setFilter('high', this)">🔴 High</button>
  </div>

  <div class="todo-list" id="todo-list"></div>

  <div class="empty" id="empty-state">
    <div class="empty-icon">✦</div>
    <p>Nothing here yet — start adding tasks.</p>
  </div>

  <div class="footer-row">
    <button class="clear-btn" onclick="clearCompleted()">Clear completed</button>
  </div>

</div>

<script>
  let todos = JSON.parse(localStorage.getItem('todos') || '[]');
  let filter = 'all';

  // Set date
  const d = new Date();
  document.getElementById('date-label').textContent =
    d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

  function saveTodos() {
    localStorage.setItem('todos', JSON.stringify(todos));
  }

  function addTodo() {
    const input = document.getElementById('todo-input');
    const priority = document.getElementById('priority-select').value;
    const text = input.value.trim();
    if (!text) { input.focus(); return; }

    todos.unshift({ id: Date.now(), text, priority, completed: false });
    saveTodos();
    input.value = '';
    input.focus();
    render();
  }

  function toggleTodo(id) {
    const t = todos.find(t => t.id === id);
    if (t) { t.completed = !t.completed; saveTodos(); render(); }
  }

  function deleteTodo(id) {
    todos = todos.filter(t => t.id !== id);
    saveTodos();
    render();
  }

  function clearCompleted() {
    todos = todos.filter(t => !t.completed);
    saveTodos();
    render();
  }

  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function getFiltered() {
    if (filter === 'active')    return todos.filter(t => !t.completed);
    if (filter === 'completed') return todos.filter(t => t.completed);
    if (filter === 'high')      return todos.filter(t => t.priority === 'high');
    return todos;
  }

  function render() {
    const list = document.getElementById('todo-list');
    const empty = document.getElementById('empty-state');
    const filtered = getFiltered();

    const total = todos.length;
    const done  = todos.filter(t => t.completed).length;
    const left  = total - done;

    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-done').textContent  = done;
    document.getElementById('stat-left').textContent  = left;
    document.getElementById('progress-bar').style.width =
      total > 0 ? Math.round((done / total) * 100) + '%' : '0%';

    if (filtered.length === 0) {
      list.innerHTML = '';
      empty.classList.add('show');
      return;
    }
    empty.classList.remove('show');

    list.innerHTML = filtered.map(t => `
      <div class="todo-item ${t.completed ? 'completed' : ''}" data-priority="${t.priority}">
        <button class="checkbox" onclick="toggleTodo(${t.id})" aria-label="Toggle task">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M2 6L5 9L10 3" stroke="#0e0e0e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <span class="todo-text">${escHtml(t.text)}</span>
        <div class="todo-meta">
          <span class="priority-badge badge-${t.priority}">${t.priority}</span>
          <button class="delete-btn" onclick="deleteTodo(${t.id})" aria-label="Delete task">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M4 4L12 12M12 4L4 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
      </div>
    `).join('');
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Enter key
  document.getElementById('todo-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTodo();
  });

  render();
</script>
</body>
</html>
